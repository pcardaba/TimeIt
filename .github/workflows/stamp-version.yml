name: Stamp version file

on:
  push:
    branches: ["main"]   # change if needed
  workflow_dispatch:

permissions:
  contents: write   # required to push back changes :contentReference[oaicite:1]{index=1}

jobs:
  stamp:
    # Avoid an infinite loop: don't run when the bot commit contains [skip ci]
    if: "!contains(toJSON(github.event.commits.*.message), '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and write file
        shell: bash
        run: |
          set -euo pipefail

          # Human-friendly version: tag+commits+sha if tags exist; falls back to sha
          VERSION="$(git describe --tags --always --dirty)"

          # Choose the file you want to keep updated
          OUT="classes/_version.py"

          cat > "$OUT" <<EOF
          # Auto-generated by GitHub Actions. Do not edit.
          __version__ = "${VERSION}"
          EOF

          echo "Wrote $OUT = $VERSION"

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail
          git status --porcelain

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add classes/_version.py
          git commit -m "chore: stamp version [skip ci]"
          git push
